apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-flask-app-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: flask-app.rules
      rules:
        - alert: FlaskAppHighErrorRate
          expr: |
            sum(rate(http_requests_total{status="500"}[5m])) > 0.05
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Flask app error rate is high"
            description: "More than 5% of requests are returning 500 errors for over 1 minute."