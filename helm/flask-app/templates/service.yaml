apiVersion: v1
kind: Service
metadata: 
  name: {{.Release.Name}}-flask-app
  labels:
    app: {{.Release.Name}}-flask-app
spec:
    type: {{.Values.service.type}}
    selector:
        app: {{.Release.Name}}-flask-app
    ports: 
     - name: http 
       protocol: TCP
       port: {{ .Values.service.port }}
       targetPort: {{ .Values.service.targetPort }}
