alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: 'slack-notifications'
      group_by: [ 'alertname' ]
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      routes:
      - matchers:
        - alertname = "Watchdog"
        receiver: 'null'
    receivers:
    - name: 'null'
    - name: 'slack-notifications'
      slack_configs:
      - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/url
        channel: '#alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
  alertmanagerSpec:
    secrets:
    - alertmanager-slack-webhook
